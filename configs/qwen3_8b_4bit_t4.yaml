# Extension experiment: 4-bit (NF4) Qwen3-8B on T4.
# Same metrics, same context-length sweep as the fp16 baseline, so we can
# compare whether quantization meaningfully extends the feasible context
# length on a 16 GB GPU.
#
# Requires bitsandbytes (CUDA-only); won't run on Mac MPS or CPU.

model_id: Qwen/Qwen3-8B
dtype: bfloat16   # compute dtype; weights stored 4-bit
trust_remote_code: false
native_context: 32768

rope_scaling:
  type: yarn
  factor: 2.0   # 32768 * 2 = 65536 — exactly the 64k cell, not over-stretched.
  original_max_position_embeddings: 32768

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16
