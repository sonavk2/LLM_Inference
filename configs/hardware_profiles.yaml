# Hardware profiles: device + dtype defaults plus metadata recorded in results.
# The benchmark auto-detects the device when --hardware is omitted, but recording
# an explicit profile name keeps results across machines easy to compare.

profiles:
  mac_mps:
    device: mps
    dtype: float16
    notes: Apple Silicon GPU; limited memory, no peak-memory API

  cpu:
    device: cpu
    dtype: float32
    notes: Reference fallback; very slow at long context

  nvidia_t4:
    device: cuda
    dtype: float16
    memory_gb: 16
    notes: 8B-class bf16 weights (~16 GB) do not fit; needs INT8/INT4 quant

  nvidia_l4:
    device: cuda
    dtype: bfloat16
    memory_gb: 24
    notes: Fits 8B bf16 weights with limited KV-cache headroom

  nvidia_a100:
    device: cuda
    dtype: bfloat16
    memory_gb: 40

  nvidia_h100:
    device: cuda
    dtype: bfloat16
    memory_gb: 80
    notes: Plenty of headroom for 8B-class models at 64k context
