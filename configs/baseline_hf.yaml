# Baseline experiment config: Hugging Face Transformers backend.
# Pairs with a model config (configs/<model>.yaml).

backend: huggingface
# Default to the instruction-tuned slot. Use --model-config on the CLI to swap
# in configs/qwen3_8b.yaml, configs/qwen2_vl_7b.yaml, or configs/qwen3_8b_4bit_t4.yaml
# without copy-pasting an experiment YAML per model.
model_config: configs/llama3_1_8b_instruct.yaml

generation:
  max_new_tokens: 128
  do_sample: false
  temperature: 1.0

prompt:
  # synthetic_repeat: tile a short seed string until the target token count is
  # reached, then verify the final length with the tokenizer.
  strategy: synthetic_repeat
  default_context_length: 8192

output:
  results_path: results/baseline_hf.jsonl
  format: jsonl
